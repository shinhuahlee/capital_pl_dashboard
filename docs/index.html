<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>損益儀表板 | 群益 API</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif; }
    .positive { color: #ef4444; }
    .negative { color: #22c55e; }
    .neutral  { color: #6b7280; }
    table { border-collapse: collapse; width: 100%; }
    th { background: #1e3a5f; color: #fff; padding: 8px 12px; text-align: left; font-size: 0.85rem; }
    td { padding: 7px 12px; font-size: 0.88rem; border-bottom: 1px solid #e5e7eb; }
    tr:hover td { background: #f0f9ff; }
    .tag-B { background:#fee2e2; color:#b91c1c; padding:2px 8px; border-radius:9999px; font-size:0.78rem; }
    .tag-S { background:#dcfce7; color:#15803d; padding:2px 8px; border-radius:9999px; font-size:0.78rem; }
    .badge { display:inline-block; padding:1px 7px; border-radius:9999px; font-size:0.75rem; }
    .tab-btn { padding:6px 16px; border-radius:8px; font-size:0.82rem; cursor:pointer; border:1px solid #cbd5e1; }
    .tab-btn.active { background:#1e3a5f; color:#fff; border-color:#1e3a5f; }
  </style>
</head>
<body class="bg-slate-100 min-h-screen p-4 md:p-8">

<!-- ── 頁首 ── -->
<header class="flex items-center justify-between mb-6">
  <div>
    <h1 class="text-2xl font-bold text-slate-800">損益儀表板</h1>
    <p class="text-sm text-slate-500 mt-0.5">群益 API 自動抓取 · <span id="updated_at">載入中…</span></p>
  </div>
  <button onclick="loadAll()" class="px-4 py-2 bg-blue-600 text-white rounded-xl text-sm hover:bg-blue-700 transition">
    ↻ 重新載入
  </button>
</header>

<!-- ── 摘要卡片 ── -->
<section class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6" id="summary-cards"></section>

<!-- ── 60天歷史損益圖 ── -->
<section class="bg-white rounded-2xl shadow p-5 mb-6">
  <div class="flex items-center justify-between mb-4">
    <h2 class="text-base font-semibold text-slate-700">📈 近60天每日損益</h2>
    <div class="flex gap-2">
      <button class="tab-btn active" id="btn-total"  onclick="switchChart('total')">總損益</button>
      <button class="tab-btn"        id="btn-close"  onclick="switchChart('close')">平倉損益</button>
      <button class="tab-btn"        id="btn-float"  onclick="switchChart('float')">浮動損益</button>
      <button class="tab-btn"        id="btn-equity" onclick="switchChart('equity')">帳戶權益</button>
    </div>
  </div>
  <canvas id="history-chart" height="120"></canvas>
  <p class="text-xs text-slate-400 mt-2">國內損益單位：新台幣元；海外損益已換算台幣（×參考匯率）</p>
</section>

<!-- ── 國內期貨權益 ── -->
<section class="mb-6">
  <h2 class="text-base font-semibold text-slate-700 mb-2">🇹🇼 國內期貨權益</h2>
  <div class="overflow-x-auto rounded-2xl shadow">
    <table>
      <thead><tr>
        <th>帳號</th><th>帳戶餘額</th><th>浮動損益</th>
        <th>平倉損益</th><th>盤中未實現</th><th>權益數</th>
        <th>風險指標%</th><th>可用餘額</th>
      </tr></thead>
      <tbody id="tf-rights-body"><tr><td colspan="8" class="text-center py-4 text-slate-400">載入中…</td></tr></tbody>
    </table>
  </div>
</section>

<!-- ── 海外期貨權益 ── -->
<section class="mb-6">
  <h2 class="text-base font-semibold text-slate-700 mb-2">🌍 海外期貨權益</h2>
  <div class="overflow-x-auto rounded-2xl shadow">
    <table>
      <thead><tr>
        <th>帳號</th><th>幣別</th><th>帳戶權益</th><th>浮動損益</th>
        <th>本日平倉損益</th><th>盤中未實現</th><th>風險指標%</th><th>參考匯率</th>
      </tr></thead>
      <tbody id="of-rights-body"><tr><td colspan="8" class="text-center py-4 text-slate-400">載入中…</td></tr></tbody>
    </table>
  </div>
</section>

<!-- ── 持倉兩欄 ── -->
<div class="grid grid-cols-1 xl:grid-cols-2 gap-6 mb-6">
  <section>
    <h2 class="text-base font-semibold text-slate-700 mb-2">📋 國內期貨未平倉</h2>
    <div class="overflow-x-auto rounded-2xl shadow">
      <table>
        <thead><tr>
          <th>商品</th><th>買賣</th><th>口數</th><th>均價</th><th>手續費</th><th>交易稅</th><th>未平倉損益</th>
        </tr></thead>
        <tbody id="tf-pos-body"><tr><td colspan="7" class="text-center py-4 text-slate-400">載入中…</td></tr></tbody>
        <tfoot id="tf-pos-foot"></tfoot>
      </table>
    </div>
  </section>
  <section>
    <h2 class="text-base font-semibold text-slate-700 mb-2">🌐 海外期貨未平倉</h2>
    <div class="overflow-x-auto rounded-2xl shadow">
      <table>
        <thead><tr>
          <th>商品</th><th>交易所</th><th>買賣</th><th>口數</th><th>均價</th><th>現價</th><th>未平損益</th>
        </tr></thead>
        <tbody id="of-pos-body"><tr><td colspan="7" class="text-center py-4 text-slate-400">載入中…</td></tr></tbody>
      </table>
    </div>
  </section>
</div>


<footer class="text-center text-xs text-slate-400 py-4">
  資料由 fetch_pl_data.py 每日寫入，git push 後更新
</footer>

<script>
// ── 工具函式 ──
function clr(v) {
  const n = parseFloat(String(v).replace(/,/g,''));
  return isNaN(n)||n===0 ? 'neutral' : n>0 ? 'positive' : 'negative';
}
function fmt(v) {
  const n = parseFloat(String(v).replace(/,/g,''));
  return isNaN(n) ? (v||'—') : n.toLocaleString('zh-TW');
}
function bs(v) {
  return v==='B' ? '<span class="tag-B">買</span>' : '<span class="tag-S">賣</span>';
}

// ── 圖表狀態 ──
let historyChart = null;
let historyData  = [];
let chartMode    = 'total';

function switchChart(mode) {
  chartMode = mode;
  ['total','close','float','equity'].forEach(m => {
    document.getElementById('btn-'+m).classList.toggle('active', m===mode);
  });
  buildHistoryChart(historyData);
}

function buildHistoryChart(rows) {
  if (!rows || !rows.length) return;
  const labels = rows.map(r => r.date.slice(5));   // MM-DD

  let tfVals, ofVals, tfLabel, ofLabel;
  const isEquity = chartMode === 'equity';

  if (chartMode === 'total') {
    tfVals  = rows.map(r => r.tf_total_pl);
    ofVals  = rows.map(r => (r.of_total_pl||0) * (r.of_ref_rate||1));
    tfLabel = '國內每日損益';
    ofLabel = '海外每日損益 (換算TWD)';
  } else if (chartMode === 'close') {
    tfVals  = rows.map(r => r.tf_close_pl);
    ofVals  = rows.map(r => (r.of_close_pl||0) * (r.of_ref_rate||1));
    tfLabel = '國內平倉損益';
    ofLabel = '海外平倉損益 (換算TWD)';
  } else if (chartMode === 'float') {
    tfVals  = rows.map(r => r.tf_float_pl);
    ofVals  = rows.map(r => (r.of_float_pl||0) * (r.of_ref_rate||1));
    tfLabel = '國內浮動損益';
    ofLabel = '海外浮動損益 (換算TWD)';
  } else {
    tfVals  = rows.map(r => r.tf_equity);
    ofVals  = rows.map(r => (r.of_equity||0) * (r.of_ref_rate||1));
    tfLabel = '國內帳戶權益';
    ofLabel = '海外帳戶權益 (換算TWD)';
  }

  // 累積損益（權益模式不做累積）
  let cumVals = null;
  if (!isEquity) {
    let sum = 0;
    cumVals = tfVals.map((v, i) => { sum += (v||0) + (ofVals[i]||0); return sum; });
  }

  const datasets = [
    {
      label: tfLabel,
      data: tfVals,
      backgroundColor: tfVals.map(v => v >= 0 ? 'rgba(239,68,68,0.75)' : 'rgba(34,197,94,0.75)'),
      borderRadius: 4,
      yAxisID: 'y',
      order: 3,
    },
    {
      label: ofLabel,
      data: ofVals,
      type: 'line',
      borderColor: '#f59e0b',
      backgroundColor: 'rgba(245,158,11,0.12)',
      pointRadius: 3,
      tension: 0.3,
      fill: false,
      yAxisID: 'y',
      order: 2,
    },
  ];

  if (cumVals) {
    datasets.push({
      label: '累積損益',
      data: cumVals,
      type: 'line',
      borderColor: '#6366f1',
      backgroundColor: 'rgba(99,102,241,0.08)',
      pointRadius: 2,
      borderWidth: 2,
      tension: 0.3,
      fill: true,
      yAxisID: 'y1',
      order: 1,
    });
  }

  if (historyChart) historyChart.destroy();
  historyChart = new Chart(document.getElementById('history-chart').getContext('2d'), {
    type: 'bar',
    data: { labels, datasets },
    options: {
      responsive: true,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { position: 'top', labels: { font: { size: 12 } } },
        tooltip: {
          callbacks: {
            label: ctx => `${ctx.dataset.label}: ${ctx.parsed.y.toLocaleString('zh-TW')}`
          }
        }
      },
      scales: {
        y:  {
          position: 'left',
          title: { display: true, text: '每日損益', font: { size: 11 } },
          ticks: { callback: v => v.toLocaleString('zh-TW') }
        },
        y1: cumVals ? {
          position: 'right',
          title: { display: true, text: '累積損益', font: { size: 11 }, color: '#6366f1' },
          ticks: { color: '#6366f1', callback: v => v.toLocaleString('zh-TW') },
          grid: { drawOnChartArea: false },
        } : { display: false },
      }
    }
  });
}


// ── 資料載入 ──
async function loadAll() {
  document.getElementById('updated_at').textContent = '載入中…';
  const t = Date.now();
  const [d, h] = await Promise.all([
    fetch('data.json?t='+t).then(r=>r.json()).catch(()=>null),
    fetch('history.json?t='+t).then(r=>r.json()).catch(()=>[]),
  ]);
  if (!d) { alert('無法載入 data.json'); return; }

  document.getElementById('updated_at').textContent = '更新：' + d.updated_at;

  // 歷史圖（顯示最近60天，全部資料保留在 history.json）
  historyData = h;
  buildHistoryChart(h.slice(-60));

  // 摘要卡片
  const tfR = d.tf_rights[0]||{}, ofR = d.of_rights[0]||{};
  const cards = [
    { label:'國內浮動損益', val: tfR.floating_pl,             unit:'元' },
    { label:'海外浮動損益', val: ofR.futures_floating_pl,     unit: ofR.currency||'' },
    { label:'國內平倉損益', val: tfR.futures_close_pl,        unit:'元' },
    { label:'海外今日平倉', val: ofR.futures_close_pl_today,  unit: ofR.currency||'' },
  ];
  document.getElementById('summary-cards').innerHTML = cards.map(c => `
    <div class="bg-white rounded-2xl shadow p-5">
      <p class="text-xs text-slate-500">${c.label}</p>
      <p class="text-2xl font-bold mt-1 ${clr(c.val)}">${fmt(c.val)}<span class="text-sm font-normal ml-1">${c.unit}</span></p>
    </div>`).join('');

  // 國內權益表
  document.getElementById('tf-rights-body').innerHTML = d.tf_rights.length
    ? d.tf_rights.map(r => `<tr>
        <td>${r.account}</td>
        <td>${fmt(r.account_balance)}</td>
        <td class="${clr(r.floating_pl)}">${fmt(r.floating_pl)}</td>
        <td class="${clr(r.futures_close_pl)}">${fmt(r.futures_close_pl)}</td>
        <td class="${clr(r.intraday_unrealized)}">${fmt(r.intraday_unrealized)}</td>
        <td>${fmt(r.equity)}</td>
        <td>${r.risk_indicator}%</td>
        <td>${fmt(r.available_balance)}</td>
      </tr>`).join('')
    : '<tr><td colspan="8" class="text-center text-slate-400 py-4">無資料</td></tr>';

  // 海外權益表
  document.getElementById('of-rights-body').innerHTML = d.of_rights.length
    ? d.of_rights.map(r => `<tr>
        <td>${r.account}</td><td>${r.currency}</td>
        <td>${fmt(r.account_equity)}</td>
        <td class="${clr(r.futures_floating_pl)}">${fmt(r.futures_floating_pl)}</td>
        <td class="${clr(r.futures_close_pl_today)}">${fmt(r.futures_close_pl_today)}</td>
        <td class="${clr(r.intraday_unrealized)}">${fmt(r.intraday_unrealized)}</td>
        <td>${r.risk_indicator}%</td>
        <td>${r.reference_rate}</td>
      </tr>`).join('')
    : '<tr><td colspan="8" class="text-center text-slate-400 py-4">無資料</td></tr>';

  // 國內持倉
  const tfFloat = d.tf_rights[0]?.floating_pl ?? '';
  document.getElementById('tf-pos-body').innerHTML = d.tf_positions.length
    ? d.tf_positions.map((p, i) => `<tr>
        <td class="font-medium">${p.future_no}</td>
        <td>${bs(p.buy_sell)}</td>
        <td>${p.qty} 口</td>
        <td>${fmt(p.avg_price)}</td>
        <td>${fmt(p.fee)}</td>
        <td>${fmt(p.tax)}</td>
        <td class="${i===0 && tfFloat!=='' ? clr(tfFloat) : 'neutral'} font-semibold">
          ${i===0 && tfFloat!=='' ? fmt(tfFloat)+' 元' : '—'}
        </td>
      </tr>`).join('')
    : '<tr><td colspan="7" class="text-center text-slate-400 py-4">無未平倉</td></tr>';
  document.getElementById('tf-pos-foot').innerHTML = '';

  // 海外持倉
  document.getElementById('of-pos-body').innerHTML = d.of_positions.length
    ? d.of_positions.map(p => `<tr>
        <td class="font-medium">${p.product_code_ym}
          ${p.is_option==='1' ? `<span class="badge bg-purple-100 text-purple-700 ml-1">${p.call_put} ${p.strike_price}</span>` : ''}
        </td>
        <td><span class="text-xs text-slate-500">${p.exchange_code}</span></td>
        <td>${bs(p.buy_sell)}</td>
        <td>${p.open_interest} 口</td>
        <td>${p.avg_price}</td>
        <td>${p.market_price}</td>
        <td class="${clr(p.unrealized_pl)}">${fmt(p.unrealized_pl)}</td>
      </tr>`).join('')
    : '<tr><td colspan="7" class="text-center text-slate-400 py-4">無未平倉</td></tr>';

}

loadAll();
</script>
</body>
</html>
