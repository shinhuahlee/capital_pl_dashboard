<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>損益儀表板 | 群益 API</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif; }
    .positive { color: #ef4444; }
    .negative { color: #22c55e; }
    .neutral  { color: #6b7280; }
    table { border-collapse: collapse; width: 100%; }
    th { background: #1e3a5f; color: #fff; padding: 8px 12px; text-align: left; font-size: 0.85rem; }
    td { padding: 7px 12px; font-size: 0.88rem; border-bottom: 1px solid #e5e7eb; }
    tr:hover td { background: #f0f9ff; }
    .tag-B { background:#fee2e2; color:#b91c1c; padding:2px 8px; border-radius:9999px; font-size:0.78rem; }
    .tag-S { background:#dcfce7; color:#15803d; padding:2px 8px; border-radius:9999px; font-size:0.78rem; }
    .badge { display:inline-block; padding:1px 7px; border-radius:9999px; font-size:0.75rem; }
  </style>
</head>
<body class="bg-slate-100 min-h-screen p-4 md:p-8">

<!-- ── 頁首 ── -->
<header class="flex items-center justify-between mb-6">
  <div>
    <h1 class="text-2xl font-bold text-slate-800">損益儀表板</h1>
    <p class="text-sm text-slate-500 mt-0.5">群益 API 自動抓取 · <span id="updated_at">載入中…</span></p>
  </div>
  <button onclick="loadData()" class="px-4 py-2 bg-blue-600 text-white rounded-xl text-sm hover:bg-blue-700 transition">
    ↻ 重新載入
  </button>
</header>

<!-- ── 摘要卡片 ── -->
<section class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6" id="summary-cards">
</section>

<!-- ── 國內期貨權益 ── -->
<section class="mb-6">
  <h2 class="text-base font-semibold text-slate-700 mb-2">🇹🇼 國內期貨權益</h2>
  <div class="overflow-x-auto rounded-2xl shadow">
    <table>
      <thead><tr>
        <th>帳號</th><th>帳戶餘額</th><th>浮動損益</th>
        <th>平倉損益</th><th>盤中未實現</th><th>權益數</th>
        <th>風險指標%</th><th>可用餘額</th>
      </tr></thead>
      <tbody id="tf-rights-body"><tr><td colspan="8" class="text-center py-4 text-slate-400">載入中…</td></tr></tbody>
    </table>
  </div>
</section>

<!-- ── 海外期貨權益 ── -->
<section class="mb-6">
  <h2 class="text-base font-semibold text-slate-700 mb-2">🌍 海外期貨權益</h2>
  <div class="overflow-x-auto rounded-2xl shadow">
    <table>
      <thead><tr>
        <th>帳號</th><th>幣別</th><th>帳戶權益</th><th>浮動損益</th>
        <th>本日平倉損益</th><th>盤中未實現</th><th>風險指標%</th><th>參考匯率</th>
      </tr></thead>
      <tbody id="of-rights-body"><tr><td colspan="8" class="text-center py-4 text-slate-400">載入中…</td></tr></tbody>
    </table>
  </div>
</section>

<!-- ── 持倉兩欄 ── -->
<div class="grid grid-cols-1 xl:grid-cols-2 gap-6 mb-6">
  <section>
    <h2 class="text-base font-semibold text-slate-700 mb-2">📋 國內期貨未平倉</h2>
    <div class="overflow-x-auto rounded-2xl shadow">
      <table>
        <thead><tr>
          <th>商品</th><th>買賣</th><th>口數</th><th>均價</th><th>手續費</th><th>交易稅</th>
        </tr></thead>
        <tbody id="tf-pos-body"><tr><td colspan="6" class="text-center py-4 text-slate-400">載入中…</td></tr></tbody>
      </table>
    </div>
  </section>

  <section>
    <h2 class="text-base font-semibold text-slate-700 mb-2">🌐 海外期貨未平倉</h2>
    <div class="overflow-x-auto rounded-2xl shadow">
      <table>
        <thead><tr>
          <th>商品</th><th>交易所</th><th>買賣</th><th>口數</th><th>均價</th><th>現價</th><th>未平損益</th>
        </tr></thead>
        <tbody id="of-pos-body"><tr><td colspan="7" class="text-center py-4 text-slate-400">載入中…</td></tr></tbody>
      </table>
    </div>
  </section>
</div>

<!-- ── 圖表 ── -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
  <div class="bg-white rounded-2xl shadow p-5">
    <h2 class="text-sm font-semibold text-slate-700 mb-3">國內期貨損益分解</h2>
    <canvas id="tf-chart" height="200"></canvas>
  </div>
  <div class="bg-white rounded-2xl shadow p-5">
    <h2 class="text-sm font-semibold text-slate-700 mb-3">海外期貨損益分解</h2>
    <canvas id="of-chart" height="200"></canvas>
  </div>
</div>

<footer class="text-center text-xs text-slate-400 py-4">
  資料由 fetch_pl_data.py 寫入 data.json，每次 git push 後更新
</footer>

<script>
function clr(v) {
  const n = parseFloat(String(v).replace(/,/g,''));
  return isNaN(n)||n===0 ? 'neutral' : n>0 ? 'positive' : 'negative';
}
function fmt(v) {
  const n = parseFloat(String(v).replace(/,/g,''));
  return isNaN(n) ? (v||'—') : n.toLocaleString('zh-TW');
}
function bs(v) {
  return v==='B' ? '<span class="tag-B">買</span>' : '<span class="tag-S">賣</span>';
}

let tfChart=null, ofChart=null;
function buildChart(id, labels, data, old) {
  if(old) old.destroy();
  return new Chart(document.getElementById(id).getContext('2d'),{
    type:'bar',
    data:{ labels, datasets:[{
      data,
      backgroundColor: data.map(v=>v>=0?'rgba(239,68,68,0.7)':'rgba(34,197,94,0.7)'),
      borderRadius:6
    }]},
    options:{ plugins:{legend:{display:false}}, scales:{y:{ticks:{callback:v=>v.toLocaleString('zh-TW')}}}}
  });
}

async function loadData() {
  document.getElementById('updated_at').textContent='載入中…';
  let d;
  try { d = await (await fetch('data.json?t='+Date.now())).json(); }
  catch(e){ alert('無法載入 data.json：'+e); return; }

  document.getElementById('updated_at').textContent = '更新：' + d.updated_at;

  // 摘要卡片
  const tfR = d.tf_rights[0]||{}, ofR = d.of_rights[0]||{};
  const cards = [
    {label:'國內浮動損益',    val:tfR.floating_pl,            unit:'元'},
    {label:'海外浮動損益',    val:ofR.futures_floating_pl,   unit:ofR.currency||''},
    {label:'國內平倉損益',    val:tfR.futures_close_pl,       unit:'元'},
    {label:'海外今日平倉',    val:ofR.futures_close_pl_today, unit:ofR.currency||''},
  ];
  document.getElementById('summary-cards').innerHTML = cards.map(c=>`
    <div class="bg-white rounded-2xl shadow p-5">
      <p class="text-xs text-slate-500">${c.label}</p>
      <p class="text-2xl font-bold mt-1 ${clr(c.val)}">${fmt(c.val)}<span class="text-sm font-normal ml-1">${c.unit}</span></p>
    </div>`).join('');

  // 國內權益
  document.getElementById('tf-rights-body').innerHTML = d.tf_rights.length
    ? d.tf_rights.map(r=>`<tr>
        <td>${r.account}</td>
        <td>${fmt(r.account_balance)}</td>
        <td class="${clr(r.floating_pl)}">${fmt(r.floating_pl)}</td>
        <td class="${clr(r.futures_close_pl)}">${fmt(r.futures_close_pl)}</td>
        <td class="${clr(r.intraday_unrealized)}">${fmt(r.intraday_unrealized)}</td>
        <td>${fmt(r.equity)}</td>
        <td>${r.risk_indicator}%</td>
        <td>${fmt(r.available_balance)}</td>
      </tr>`).join('')
    : '<tr><td colspan="8" class="text-center text-slate-400 py-4">無資料</td></tr>';

  // 海外權益
  document.getElementById('of-rights-body').innerHTML = d.of_rights.length
    ? d.of_rights.map(r=>`<tr>
        <td>${r.account}</td><td>${r.currency}</td>
        <td>${fmt(r.account_equity)}</td>
        <td class="${clr(r.futures_floating_pl)}">${fmt(r.futures_floating_pl)}</td>
        <td class="${clr(r.futures_close_pl_today)}">${fmt(r.futures_close_pl_today)}</td>
        <td class="${clr(r.intraday_unrealized)}">${fmt(r.intraday_unrealized)}</td>
        <td>${r.risk_indicator}%</td>
        <td>${r.reference_rate}</td>
      </tr>`).join('')
    : '<tr><td colspan="8" class="text-center text-slate-400 py-4">無資料</td></tr>';

  // 國內持倉
  document.getElementById('tf-pos-body').innerHTML = d.tf_positions.length
    ? d.tf_positions.map(p=>`<tr>
        <td class="font-medium">${p.future_no}</td>
        <td>${bs(p.buy_sell)}</td>
        <td>${p.qty} 口</td>
        <td>${fmt(p.avg_price)}</td>
        <td>${fmt(p.fee)}</td>
        <td>${fmt(p.tax)}</td>
      </tr>`).join('')
    : '<tr><td colspan="6" class="text-center text-slate-400 py-4">無未平倉</td></tr>';

  // 海外持倉
  document.getElementById('of-pos-body').innerHTML = d.of_positions.length
    ? d.of_positions.map(p=>`<tr>
        <td class="font-medium">${p.product_code_ym}
          ${p.is_option==='1'?`<span class="badge bg-purple-100 text-purple-700 ml-1">${p.call_put} ${p.strike_price}</span>`:''}
        </td>
        <td><span class="text-xs text-slate-500">${p.exchange_code}</span></td>
        <td>${bs(p.buy_sell)}</td>
        <td>${p.open_interest} 口</td>
        <td>${p.avg_price}</td>
        <td>${p.market_price}</td>
        <td class="${clr(p.unrealized_pl)}">${fmt(p.unrealized_pl)}</td>
      </tr>`).join('')
    : '<tr><td colspan="7" class="text-center text-slate-400 py-4">無未平倉</td></tr>';

  // 圖表
  if(d.tf_rights.length){
    const r=d.tf_rights[0];
    tfChart=buildChart('tf-chart',
      ['浮動損益','平倉損益','盤中未實現'],
      [+r.floating_pl||0,+r.futures_close_pl||0,+r.intraday_unrealized||0],tfChart);
  }
  if(d.of_rights.length){
    const r=d.of_rights[0];
    ofChart=buildChart('of-chart',
      ['浮動損益','今日平倉','盤中未實現'],
      [+r.futures_floating_pl||0,+r.futures_close_pl_today||0,+r.intraday_unrealized||0],ofChart);
  }
}

loadData();
</script>
</body>
</html>
